<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost Airlines</title>
    <meta
      name="description"
      content="Low fares to the places everyone's talking about. Ghost Airlines flies you to the country's most talked-about small towns."
    />
    <!-- Applies the persisted theme before first paint to avoid a flash of the wrong one. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem("theme")
          if (
            t === "dark" ||
            (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark")
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
